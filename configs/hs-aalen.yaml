# ============================================================
# HS Aalen — Suchmaschinen-Konfiguration
# Alle drei bestehenden Quellen: Hauptwebsite, ASTA, Stundenplan
# ============================================================

name: "hs-aalen"
language: "de"
description: "Suchmaschine für die Hochschule Aalen"

# ------------------------------------------------------------------
# Embedding-Modell (gilt für alle Quellen dieser Config)
# WICHTIG: Wenn du das Modell änderst, musst du neu indexieren!
# ------------------------------------------------------------------
embedding_model: "intfloat/multilingual-e5-base"
vector_size: 768

# Optionale Sparse-Vektoren (BM42/SPLADE) — deaktiviert per Default.
# Aktivieren mit: USE_SPARSE_VECTORS=true oder sparse_vectors: true
sparse_vectors: false
sparse_model: "Qdrant/bm42-all-minilm-l6-v2-attentions"

# ------------------------------------------------------------------
# ColBERT Late Interaction — token-level MaxSim scoring (opt-in)
# ------------------------------------------------------------------
# Statt eines einzigen Vektors pro Chunk werden Token-Embeddings gespeichert.
# Bei der Suche matcht jedes Query-Token gegen alle Dokument-Token (MaxSim).
# Deutlich besser für seltene Fachbegriffe wie "§19 Abs. 3" oder "SPO 2022".
#
# Empfohlenes Modell für Deutsch: jinaai/jina-colbert-v2 (multilingual, 128-dim)
# Alternative (Englisch): colbert-ir/colbertv2.0
#
# Voraussetzung: pip install 'fastembed>=0.3'
# WICHTIG: Erhöht Speicherverbrauch im Qdrant erheblich (~10-50x mehr Vektoren).
#          Nach Aktivierung muss neu indexiert werden!
# Aktivieren mit: USE_COLBERT_VECTORS=true oder colbert_vectors: true
colbert_vectors: false
colbert_model: "jinaai/jina-colbert-v2"
colbert_dim: 128             # Token-Embedding-Dimension (128 für alle ColBERT-Modelle)

# ------------------------------------------------------------------
# Qdrant Verbindung
# ------------------------------------------------------------------
qdrant:
  host: "localhost"
  port: 6333

# ------------------------------------------------------------------
# LLM-Integration (Query Expansion, Reranking, Summary)
# ------------------------------------------------------------------
llm:
  ollama_url: "http://localhost:11434/api/generate"
  ollama_model: "deepseek-r1:8b"
  openai_model: "gpt-4o-mini"

# ------------------------------------------------------------------
# Datenquellen — jede Quelle landet in ihrer eigenen Collection
# ------------------------------------------------------------------
sources:
  # 1. HS Aalen Hauptwebsite — größte Collection (Hauptinhalt)
  - name: "hs_aalen_main"
    type: website
    url: "https://www.hs-aalen.de"
    max_depth: 3
    respect_robots_txt: true
    js_rendering: false       # auf true setzen wenn viel JS-Content
    collection: "hs_aalen_search"
    result_type: "webpage"
    search_weight: 0.50       # 50% der Suchergebnisse aus dieser Collection
    # Parent-Child Retrieval (Small-to-Big):
    #   chunk_size        → Child-Chunk (wird embedded, präzises Retrieval)
    #   parent_chunk_size → Parent-Chunk (wird zurückgegeben, voller Kontext)
    # Retrieval erfolgt über den kleinen Child-Chunk (200 Zeichen),
    # das Ergebnis zeigt den größeren Parent-Chunk (1000 Zeichen).
    # WICHTIG: Nach Änderung dieser Werte muss neu indexiert werden!
    chunk_size: 200
    chunk_overlap: 30
    parent_chunk_size: 1000

  # 2. ASTA (Verfasste Studierendenschaft HS Aalen)
  - name: "asta"
    type: website
    url: "https://www.vs-hs-aalen.de"
    max_depth: 2
    respect_robots_txt: true
    js_rendering: false
    collection: "asta_content"
    result_type: "asta"
    search_weight: 0.10
    chunk_size: 200
    chunk_overlap: 30
    parent_chunk_size: 800    # etwas kleiner, da ASTA-Seiten kompakter sind

  # 3. Starplan Stundenplan (iCal API der HTW Aalen)
  - name: "stundenplan"
    type: starplan
    base_url: "https://vorlesungen.htw-aalen.de/splan"
    planning_unit_id: 50
    collection: "starplan_timetable"
    result_type: "timetable"
    search_weight: 0.15

  # 4. Zusätzliche einzelne Seiten (optional — per Liste)
  # - name: "spezialseiten"
  #   type: urls
  #   list:
  #     - "https://www.hs-aalen.de/spezialseite-1"
  #     - "https://www.hs-aalen.de/spezialseite-2"
  #   collection: "hs_aalen_search"
  #   result_type: "webpage"
  #   search_weight: 0.0   # 0 = nur indexieren, nicht als eigene Gewichtung

  # 5. Lokale Dateien (PDFs, Markdown, Textdateien)
  # - name: "spo_dokumente"
  #   type: folder
  #   path: "/home/flo/dokumente/spo"
  #   extensions: [".pdf", ".txt", ".md"]
  #   collection: "hs_aalen_docs"
  #   result_type: "document"
  #   search_weight: 0.25

# ------------------------------------------------------------------
# Suchparameter
# ------------------------------------------------------------------
search:
  relevance_min_score: 0.34
  cross_encoder_model: "cross-encoder/mmarco-mMiniLMv2-L12-H384-v1"

  # ------------------------------------------------------------------
  # Query Result Cache (TTL-based, in-memory, thread-safe)
  # Identical queries within the TTL window are served instantly without
  # re-embedding, Qdrant lookup, reranking, or LLM calls.
  # Override via env: SEARCH_CACHE_TTL, SEARCH_CACHE_MAX_SIZE
  # ------------------------------------------------------------------
  cache:
    ttl_seconds: 300    # 5 minutes — set to 0 to disable effectively
    max_size: 512       # max cached queries before oldest-quarter eviction

  # Studiengangskürzel-Synonyme (ohne LLM, rein regelbasiert)
  program_synonyms:
    informatik: ["in", "ai", "csc", "computer science", "kuenstliche intelligenz", "ki"]
    "computer science": ["informatik", "in", "csc", "ai", "ki"]
    ki: ["kuenstliche intelligenz", "ai", "informatik", "in"]
    "kuenstliche intelligenz": ["ki", "ai", "informatik", "in"]
    ai: ["ki", "kuenstliche intelligenz", "informatik", "in", "csc"]
    csc: ["informatik", "in", "computer science", "ai", "ki"]
    elektrotechnik: ["et", "e technik", "etechnik", "electronics"]
    "e technik": ["et", "elektrotechnik", "etechnik"]
    et: ["elektrotechnik", "e technik", "etechnik"]
    maschinenbau: ["mb", "mechanical engineering"]
    mb: ["maschinenbau", "mechanical engineering"]
    wirtschaftsinformatik: ["winf", "business informatics"]
    winf: ["wirtschaftsinformatik", "business informatics"]
    "data science": ["ds"]
    ds: ["data science"]

  module_synonyms:
    "theoretische informatik": ["tib", "theo", "thi"]
    "theoretische info": ["tib", "theo", "thi"]
    theo: ["theoretische informatik", "tib"]
    mathematik: ["mathe", "ma"]
    "mathematik 1": ["mathe 1", "ma1", "ma 1"]
    "mathematik 2": ["mathe 2", "ma2", "ma 2"]
    "software engineering": ["se"]
    "software engineering 1": ["se1", "se 1"]
    "software engineering 2": ["se2", "se 2"]
    "mensch computer interaktion": ["mci"]
    "mensch-computer-interaktion": ["mci"]
