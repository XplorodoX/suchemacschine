version: '3.8'

services:
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant-service${STACK_SUFFIX:-}
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: search-api-service${STACK_SUFFIX:-}
    ports:
      - "${BACKEND_HOST_PORT:-6055}:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app.py:/app/app.py
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=paraphrase-multilingual-MiniLM-L12-v2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: search-frontend-service${STACK_SUFFIX:-}
    ports:
      - "${FRONTEND_HOST_PORT:-6056}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://campusindex.8xc.de}
    restart: always

  scrapers:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: search-scrapers-service${STACK_SUFFIX:-}
    volumes:
      - ./data:/app/data
      - ./scrapers:/app
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["parallel"]
    profiles:
      - scrapers
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
    name: ${QDRANT_VOLUME_NAME:-qdrant_storage}
