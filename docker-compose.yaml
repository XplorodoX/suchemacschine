version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-service
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  search-api:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: search-api-service
    ports:
      - "8055:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_URL=http://host.containers.internal:11434/api/generate
      - OLLAMA_MODEL=deepseek-r1:8b
    depends_on:
      - qdrant
    restart: always

volumes:
  qdrant_storage:
