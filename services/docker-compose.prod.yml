version: '3.8'

services:
  # ============ DATA LAYER ============
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat </dev/null >/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============ SCRAPING SERVICES ============
  
  # Website Scraper (runs every 2 weeks)
  website-scraper:
    image: suchemacschine/website-scraper:latest
    build:
      context: ./scrapers/website-scraper
      dockerfile: Dockerfile
    container_name: website-scraper
    profiles:
      - pipeline
    environment:
      - TARGET_URLS=https://www.hs-aalen.de,https://www.hs-aalen.de/studium,https://www.hs-aalen.de/department
      - MAX_DEPTH=3
      - TIMEOUT_MINUTES=60
      - OUTPUT_DIR=/data/raw
    volumes:
      - scrape_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"  # Runs on schedule only

  # PDF Indexer (runs every 2 weeks)
  pdf-indexer:
    image: suchemacschine/pdf-indexer:latest
    build:
      context: ./scrapers/pdf-indexer
      dockerfile: Dockerfile
    container_name: pdf-indexer
    profiles:
      - pipeline
    environment:
      - PDF_SOURCES=/pdf_sources
      - OUTPUT_DIR=/data/raw
    volumes:
      - pdf_sources:/pdf_sources
      - scrape_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  # Timetable Scraper (runs every week)
  timetable-scraper:
    image: suchemacschine/timetable-scraper:latest
    build:
      context: ./scrapers/timetable-scraper
      dockerfile: Dockerfile
    container_name: timetable-scraper
    profiles:
      - pipeline
    environment:
      - API_URL=https://hochschulportal.hs-aalen.de
      - OUTPUT_DIR=/data/raw
    volumes:
      - scrape_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  # ============ PROCESSING SERVICES ============

  # Text Processor & Tokenizer
  text-processor:
    image: suchemacschine/text-processor:latest
    build:
      context: ./processing/text-processor
      dockerfile: Dockerfile
    container_name: text-processor
    profiles:
      - pipeline
    environment:
      - INPUT_DIR=/data/raw
      - OUTPUT_DIR=/data/processed
      - CHUNK_SIZE=512
      - OVERLAP=50
    volumes:
      - scrape_data:/data
    restart: "no"

  # Vector Embeddings Service (uses Ollama)
  embeddings-service:
    image: suchemacschine/embeddings-service:latest
    build:
      context: ./processing/embeddings
      dockerfile: Dockerfile
    container_name: embeddings-service
    profiles:
      - pipeline
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=nomic-embed-text
      - INPUT_DIR=/data/processed
      - OUTPUT_DIR=/data/embeddings
    volumes:
      - scrape_data:/data
    depends_on:
      - text-processor
    restart: "no"

  # ============ INDEXING SERVICE ============

  # Qdrant Indexer
  qdrant-indexer:
    image: suchemacschine/qdrant-indexer:latest
    build:
      context: ./indexing/qdrant-indexer
      dockerfile: Dockerfile
    container_name: qdrant-indexer
    profiles:
      - pipeline
    environment:
      - QDRANT_HOST=qdrant-db
      - QDRANT_PORT=6333
      - INPUT_DIR=/data/embeddings
      - COLLECTIONS=hs_aalen_search,hs_aalen_website,timetable_data
    volumes:
      - scrape_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings-service:
        condition: service_completed_successfully
    restart: "no"

  # ============ API SERVICES ============

  # Main Search API
  search-api:
    image: suchemacschine/search-api:latest
    build:
      context: ./api/search-api
      dockerfile: Dockerfile
    container_name: search-api-prod
    ports:
      - "8055:8000"
    environment:
      - QDRANT_HOST=qdrant-db
      - QDRANT_PORT=6333
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=deepseek-r1:8b
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ SCHEDULER ============

  # APScheduler - koordiniert alle 2-Wochen-Tasks
  scheduler:
    image: suchemacschine/scheduler:latest
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: data-scheduler
    user: "0:0"
    privileged: true
    security_opt:
      - label=disable
    environment:
      - SCHEDULER_INTERVAL_DAYS=14
      - PYTHONUNBUFFERED=1
      - RUN_ON_STARTUP=true
      - SCHEDULER_STATE_DIR=/state
      - BOOTSTRAP_MARKER=/state/bootstrap_complete
      - QDRANT_HEALTH_URL=http://qdrant-db:6333/collections
      - PIPELINE_NETWORK=suchemacschine_net
      - PIPELINE_DATA_VOLUME=suchemacschine_scrape_data
      - PIPELINE_PDF_VOLUME=suchemacschine_pdf_sources
      - WEBSITE_SCRAPER_IMAGE=suchemacschine/website-scraper:latest
      - PDF_INDEXER_IMAGE=suchemacschine/pdf-indexer:latest
      - TIMETABLE_SCRAPER_IMAGE=suchemacschine/timetable-scraper:latest
      - TEXT_PROCESSOR_IMAGE=suchemacschine/text-processor:latest
      - EMBEDDINGS_SERVICE_IMAGE=suchemacschine/embeddings-service:latest
      - QDRANT_INDEXER_IMAGE=suchemacschine/qdrant-indexer:latest
    volumes:
      - ${CONTAINER_SOCKET_PATH}:/var/run/docker.sock:z
      - scheduler_state:/state
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always

volumes:
  qdrant_storage:
    name: suchemacschine_qdrant_storage
  scrape_data:
    name: suchemacschine_scrape_data
  pdf_sources:
    name: suchemacschine_pdf_sources
  scheduler_state:
    name: suchemacschine_scheduler_state

networks:
  default:
    name: suchemacschine_net
    driver: bridge
