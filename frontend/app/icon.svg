<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Background Shape -->
  <rect width="512" height="512" rx="128" fill="url(#grad1)" />
  
  <!-- Search / Campus Icon Group -->
  <g filter="url(#shadow)">
    <!-- Magnifying Glass Glass/Ring -->
    <circle cx="230" cy="230" r="100" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
    <!-- Magnifying Glass Handle -->
    <line x1="300" y1="300" x2="400" y2="400" stroke="#ffffff" stroke-width="48" stroke-linecap="round"/>
    
    <!-- Abstract Graduation Cap / Book inside the glass -->
    <!-- Cap top -->
    <polygon points="230,165 300,195 230,225 160,195" fill="#ffffff" />
    <polygon points="230,175 290,200 230,225 170,200" fill="#e0f2fe" />
    <!-- Cap base / tassel abstraction -->
    <rect x="220" y="225" width="20" height="30" fill="#ffffff" rx="4"/>
    <circle cx="288" cy="225" r="8" fill="#ffffff" />
    <path d="M 288 225 L 295 255 L 281 255 Z" fill="#ffffff"/>
  </g>
</svg>
